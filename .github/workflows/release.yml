name: Release Phonolite Obsidian Plugin

permissions:
  contents: write
  packages: write
  deployments: write
  releases: write


on:
    push:
        tags:
            - "*"

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22.x"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Build production bundle
              run: npm run build

            - name: Create release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  tag="${GITHUB_REF#refs/tags/}"
                  gh release create "$tag" \
                    dist/main.js \
                    dist/manifest.json \
                    dist/styles.css \
                    --title "v${tag}" \
                    --generate-notes
